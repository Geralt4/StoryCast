<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryCast</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
            box-shadow: 0 8px 32px rgba(0, 122, 255, 0.3);
        }
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 1.2em;
            color: #a0aec0;
            margin-bottom: 48px;
            line-height: 1.5;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-card {
            display: block;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px 32px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
        }
        .link-card:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .link-card-icon {
            font-size: 1.5em;
            margin-bottom: 8px;
        }
        .link-card-title {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .link-card-desc {
            font-size: 0.9em;
            color: #a0aec0;
        }
        .footer {
            margin-top: 48px;
            color: #6b7280;
            font-size: 0.85em;
        }
        .footer a {
            color: #a0aec0;
            text-decoration: none;
        }
        .footer a:hover {
            color: #fff;
            text-decoration: underline;
        }
        @media (min-width: 480px) {
            .links {
                flex-direction: row;
            }
            .link-card {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">&#128214;</div>
        <h1>StoryCast</h1>
        <p class="tagline">A privacy-focused audiobook player for iOS.<br>No accounts. No tracking. Just you and your books.</p>

        <div class="links">
            <a class="link-card" href="./support.html">
                <div class="link-card-icon">&#128172;</div>
                <div class="link-card-title">Support & FAQ</div>
                <div class="link-card-desc">Get help, report bugs, or ask questions</div>
            </a>
            <a class="link-card" href="./privacy.html">
                <div class="link-card-icon">&#128274;</div>
                <div class="link-card-title">Privacy Policy</div>
                <div class="link-card-desc">How we handle your data</div>
            </a>
        </div>

        <p class="footer">
            <a href="https://github.com/Geralt4/StoryCast">View on GitHub</a>
        </p>
    </div>
</body>
</html>
